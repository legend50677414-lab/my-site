<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سقطرى - جوهرة اليمن</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f4f4; text-align: center; }
        header { background: #27ae60; color: white; padding: 40px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: white; margin: 15px; border-radius: 10px; width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        h3 { color: #27ae60; }
    </style>
</head>
<body>
    <header>
        <h1>طبيعة جزيرة سقطرى الساحرة</h1>
        <p>اكتشف أغرب وأجمل التضاريس في العالم</p>
    </header>

    <div class="container">
        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cd/Dracaena_cinnabari_at_Diksam_Plateau.jpg" alt="دم الأخوين">
            <div class="card-content">
                <h3>شجرة دم الأخوين</h3>
                <p>تعتبر من أندر الأشجار في العالم وتوجد فقط في سقطرى.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Arher_beach%2C_Socotra.jpg" alt="شاطئ أرعر">
            <div class="card-content">
                <h3>شاطئ أرعر</h3>
                <p>جمال الرمال البيضاء والمياه الصافية التي تسر الناظرين.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Adenium_obesum_socotranum.jpg" alt="شجرة الزجاجة">
            <div class="card-content">
                <h3>شجرة زجاجة الصحراء</h3>
                <p>تتكيف مع الطبيعة وتعتبر من الرموز النباتية للجزيرة.</p>
            </div>
        </div>
    </div>
</body>
</html>
