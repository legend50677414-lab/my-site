<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سقطرى | أعجوبة الطبيعة العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1b5e20; /* أخضر طبيعي */
            --accent-color: #ffd600;  /* أصفر شمس */
            --bg-pattern: #e8f5e9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f9fbf9;
            /* نقشة خلفية عالمية ناعمة */
            background-image: radial-gradient(#1b5e20 0.5px, transparent 0.5px), radial-gradient(#1b5e20 0.5px, #f9fbf9 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #333;
            line-height: 1.6;
        }

        /* هيدر بتصميم "البطل" (Hero Section) */
        header {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1578326457399-3b34dbbf23b8?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%); /* قصة عالمية في الأسفل */
        }

        header h1 { 
            font-family: 'Tajawal', sans-serif;
            font-size: 4rem; 
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: fadeInDown 1.5s ease;
        }

        header p { 
            font-size: 1.4rem; 
            margin-top: 10px;
            background: rgba(0,0,0,0.2);
            padding: 5px 20px;
            border-radius: 50px;
        }

        /* حاوية الصور والتصاميم */
        .container {
            max-width: 1200px;
            margin: -50px auto 50px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* تصميم البطاقة العالمي */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* تأثير الزجاج الضبابي */
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid white;
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-20px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 5px solid var(--accent-color);
        }

        .card-content { padding: 25px; text-align: center; }

        .card-content h3 { color: var(--primary-color); font-size: 1.6rem; margin-bottom: 10px; }

        .card-content p { color: #666; font-size: 1rem; }

        /* تذييل الموقع بنقشة */
        footer {
            background: var(--primary-color);
            color: white;
            padding: 50px 20px;
            text-align: center;
            clip-path: polygon(0 15%, 100% 0, 100% 100%, 0% 100%);
        }

        /* أنيميشن بسيط */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .container { margin-top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>سُـقُـطـرَى</h1>
        <p>الجزيرة الأغرب على وجه الأرض</p>
    </header>

    <div class="container">
        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cd/Dracaena_cinnabari_at_Diksam_Plateau.jpg" alt="Socotra">
            <div class="card-content">
                <h3>دم الأخوين</h3>
                <p>أسطورة حية تضرب جذورها في عمق التاريخ السقطري.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1590523741877-29a3a5df0e5a?auto=format&fit=crop&w=800&q=80" alt="Arher Beach">
            <div class="card-content">
                <h3>شواطئ لا تضاهى</h3>
                <p>رمال بيضاء ناصعة تعانق مياه المحيط الزمردية.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Adenium_obesum_socotranum.jpg" alt="Bottle Tree">
            <div class="card-content">
                <h3>تنوع حيوي عالمي</h3>
                <p>موطن لآلاف الكائنات التي لا تعيش في أي مكان آخر.</p>
            </div>
        </div>
    </div>

    <footer>
        <p>تصميم مبرمج مبدع © 2026</p>
        <div style="margin-top: 15px; font-size: 0.9rem; opacity: 0.7;">
            استكشف جمال اليمن | مشروع تعليمي
        </div>
    </footer>

</body>
</html>
